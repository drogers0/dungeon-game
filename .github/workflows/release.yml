name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # dry-run: builds + uploads per-OS zips as workflow artifacts (no release)

permissions:
  contents: write

jobs:
  # ── Create the GitHub Release once (tag-triggered only) ───────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          # Mark pre-release-style tags (v1.0.0-rc1, v1.2.0-beta, …) as pre-releases
          # so they don't show as "Latest"; a plain vX.Y.Z tag is a full release.
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── Build + package per platform ─────────────────────────────────────────
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: create-release
    if: always() && (github.event_name == 'workflow_dispatch' || needs.create-release.result == 'success')

    strategy:
      fail-fast: false # one platform failing must not cancel the others (release would lose their assets)
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
          - os: ubuntu-latest
            name: linux

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux SFML dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libx11-dev libxrandr-dev libxcursor-dev libxi-dev \
            libudev-dev libgl-dev libopenal-dev \
            libfreetype-dev libflac-dev libvorbis-dev libogg-dev

      - name: Cache SFML build deps
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/_deps
          key: ${{ runner.os }}-sfmldeps-release-v2-${{ hashFiles('CMakeLists.txt', '.github/workflows/release.yml') }}
          restore-keys: ${{ runner.os }}-sfmldeps-release-v2-

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cmake -B build -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=OFF `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DDUNGEON_BUILD_TESTS=OFF

      - name: Configure (macOS / Linux)
        if: matrix.os != 'windows-latest'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DDUNGEON_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release -j

      - name: Stage (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dungeon-game-windows
          Copy-Item build/Release/dungeon_game.exe dungeon-game-windows/
          # SFML 3 uses miniaudio internally — no openal32.dll is shipped/needed.
          Copy-Item -Recurse build/Release/assets  dungeon-game-windows/

      - name: Stage (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # TODO #25 — re-verify framework bundling for SFML 3.
          # SFML 2.6.2's extlibs/libs-osx/Frameworks/ (freetype/OpenAL/vorbis/FLAC) does
          # NOT exist in SFML 3: with BUILD_SHARED_LIBS=OFF + FetchContent, SFML 3 static-
          # links freetype and uses miniaudio (no OpenAL framework), so typically nothing
          # needs bundling. Inspect otool -L below and bundle any non-system dylib before
          # relying on this zip. Gate merge on a workflow_dispatch dry-run of this workflow:
          # download the macos zip and run the bundled binary on a clean path.
          mkdir -p dungeon-game-macos/Frameworks
          cp build/dungeon_game dungeon-game-macos/
          cp -R build/assets    dungeon-game-macos/
          bin=dungeon-game-macos/dungeon_game
          echo "== otool -L $bin =="
          otool -L "$bin"
          # Copy every non-system dylib the binary references into Frameworks/ and repoint.
          bundled=0
          while read -r dylib; do
            case "$dylib" in
              /usr/lib/*|/System/*|@rpath/*|@executable_path/*|"") continue ;;
            esac
            if [ -f "$dylib" ]; then
              cp "$dylib" dungeon-game-macos/Frameworks/
              base=$(basename "$dylib")
              install_name_tool -change "$dylib" "@executable_path/Frameworks/$base" "$bin"
              bundled=$((bundled+1))
            fi
          done < <(otool -L "$bin" | tail -n +2 | awk '{print $1}')
          if [ "$bundled" -gt 0 ]; then
            install_name_tool -add_rpath @executable_path/Frameworks "$bin" || true
            echo "Bundled $bundled non-system dylib(s)."
          else
            rmdir dungeon-game-macos/Frameworks 2>/dev/null || true
            echo "No non-system dylibs to bundle (SFML 3 static link)."
          fi

      - name: Stage (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir dungeon-game-linux
          cp build/dungeon_game   dungeon-game-linux/
          cp -r build/assets      dungeon-game-linux/

      - name: Zip (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path dungeon-game-windows -DestinationPath dungeon-game-windows.zip

      - name: Zip (macOS / Linux)
        if: matrix.os != 'windows-latest'
        run: zip -r dungeon-game-${{ matrix.name }}.zip dungeon-game-${{ matrix.name }}

      - name: Upload to GitHub Release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dungeon-game-${{ matrix.name }}.zip

      - name: Upload workflow artifact (dispatch dry-run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: dungeon-game-${{ matrix.name }}
          path: dungeon-game-${{ matrix.name }}.zip
