name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # ── Linux: full suite under xvfb + LLVM coverage ──────────────────────────
  build-linux:
    name: Build + Coverage (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            clang llvm clang-format-18 clang-tidy-18 xvfb \
            libx11-dev libxrandr-dev libxcursor-dev libxi-dev \
            libudev-dev libgl-dev libopenal-dev \
            libfreetype-dev libflac-dev libvorbis-dev libogg-dev

      - name: Cache SFML build deps
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/_deps
          key: ${{ runner.os }}-sfmldeps-v1-${{ hashFiles('CMakeLists.txt', '.github/workflows/ci.yml') }}
          restore-keys: ${{ runner.os }}-sfmldeps-v1-

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=Debug \
            -DDUNGEON_BUILD_TESTS=ON \
            -DDUNGEON_COVERAGE=ON

      - name: Build
        run: cmake --build build -j

      - name: Run tests (xvfb for integration cases)
        env:
          ALSOFT_DRIVERS: 'null'   # headless runner has no audio device; OpenAL-soft null driver
                                   # so SoundBuffer/Sound calls are safe no-ops (else burn.play() segfaults)
        run: |
          mkdir -p build/cov
          LLVM_PROFILE_FILE=$PWD/build/cov/%p-%m.profraw \
            xvfb-run -a ctest --test-dir build --output-on-failure

      - name: Coverage report
        run: |
          llvm-profdata merge build/cov/*.profraw -o build/cov/merged.profdata
          llvm-cov report \
            build/tests/dungeon_tests \
            -object build/tests/dungeon_integration_tests \
            -object build/dungeon_game \
            -instr-profile=build/cov/merged.profdata \
            -ignore-filename-regex='main\.cpp|tests/'

      - name: Generate menu screenshots
        env:
          ALSOFT_DRIVERS: 'null'
        run: |
          for st in main_menu ai_difficulty host_waiting join_input ready_to_start settings; do
            xvfb-run -a ./build/dungeon_game --menu-state "$st" --frames 2 \
              --screenshot-every 1 --screenshot-dir "build/menu_shots/$st" || true
          done
          ls -R build/menu_shots || true

      - name: Upload menu screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: menu-screenshots
          path: build/menu_shots/

      - name: Check formatting (clang-format-18)
        run: |
          git ls-files 'src/*.cpp' 'include/*.h' 'tests/*.cpp' \
            | xargs clang-format-18 --dry-run --Werror

      - name: Lint (clang-tidy, advisory)
        continue-on-error: true   # .clang-tidy is advisory (WarningsAsErrors: ''); -Werror is the hard gate
        run: |
          clang-tidy-18 -p build $(git ls-files 'src/*.cpp')

  # ── macOS: unit tests only (SFML windows on GH macOS runners are flaky) ───
  build-macos:
    name: Build + Unit Tests (macos-latest)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache SFML build deps
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/_deps
          key: ${{ runner.os }}-sfmldeps-v1-${{ hashFiles('CMakeLists.txt', '.github/workflows/ci.yml') }}
          restore-keys: ${{ runner.os }}-sfmldeps-v1-

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DDUNGEON_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j

      - name: Run unit tests (no display required)
        run: ctest --test-dir build -L unit --output-on-failure

  # ── Windows: MSVC static build + unit tests ───────────────────────────────
  build-windows:
    name: Build + Unit Tests (windows-latest)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache SFML build deps
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/_deps
          key: ${{ runner.os }}-sfmldeps-v1-${{ hashFiles('CMakeLists.txt', '.github/workflows/ci.yml') }}
          restore-keys: ${{ runner.os }}-sfmldeps-v1-

      - name: Configure
        run: |
          cmake -B build -A x64 `
            -DDUNGEON_BUILD_TESTS=ON `
            -DBUILD_SHARED_LIBS=OFF `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

      - name: Build
        run: cmake --build build --config Release -j

      - name: Run unit tests
        shell: pwsh
        run: |
          $env:PATH = "$env:GITHUB_WORKSPACE/build/Release;$env:PATH"
          ctest --test-dir build -C Release -L unit --output-on-failure
